name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to /league/...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Browser, screenshots, error messages, etc.
